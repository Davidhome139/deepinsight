global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'your-password'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/api/v1/webhooks/alerts'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/api/v1/webhooks/alerts'
        send_resolved: true
    # email_configs:
    #   - to: 'admin@example.com'
    #     send_resolved: true

  - name: 'warning'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/api/v1/webhooks/alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
